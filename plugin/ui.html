<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{
    --bg:#050505; --card:#0C0C0C; --field:#101010; --border:#1D1D1D;
    --text:#EFF0EB; --muted:#7B7B78; --danger:#E24B4A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    background-image:radial-gradient(600px 220px at 50% -80px, rgba(239,240,235,.05), transparent 70%);
    font:400 12px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding:18px 16px 16px; -webkit-font-smoothing:antialiased;
  }
  .ond{height:11px; width:auto; color:var(--muted); display:block; margin-bottom:16px}
  .head{display:flex; align-items:center; gap:10px; margin-bottom:4px}
  .iso{height:18px; width:18px; color:var(--text)}
  .iso path{opacity:1}
  .spin .iso path{animation:pvdot 1s linear infinite}
  @keyframes pvdot{0%{opacity:1}100%{opacity:.08}}
  h1{font:500 16px/1 inherit; letter-spacing:.01em}
  .sub{color:var(--muted); font-size:11px; margin-bottom:14px}
  .card{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px}
  .label{color:var(--muted); font-size:11px; margin-bottom:5px; display:block}
  input[type=text],input[type=password]{
    width:100%; background:var(--field); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:8px 10px; font:inherit; outline:none;
  }
  input:focus{border-color:#3a3a3a}
  .gap{height:10px}
  .frame-info{font-size:11px; color:var(--muted); line-height:1.6}
  .frame-info b{color:var(--text); font-weight:500}
  .badge{display:inline-block; background:var(--field); border:1px solid var(--border);
    border-radius:5px; padding:1px 7px; font-size:10px; color:var(--text); margin-left:6px}
  .finalurl{margin-top:8px; font-size:10.5px; color:var(--muted); word-break:break-all}
  .finalurl span{color:var(--text)}
  .check{display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; margin-top:10px}
  .check input{accent-color:#EFF0EB}
  button{
    width:100%; background:var(--text); color:#0a0a0a; border:0; border-radius:8px;
    padding:11px; font:500 12px/1 inherit; cursor:pointer; letter-spacing:.02em;
  }
  button:hover:not(:disabled){background:#fff}
  button:disabled{opacity:.35; cursor:default}
  #status{margin-top:10px; font-size:11px; color:var(--muted); min-height:16px}
  #status.error{color:var(--danger)}
  #result{display:none; margin-top:10px}
  #result a{color:var(--text); word-break:break-all; text-decoration:underline; text-underline-offset:3px; font-size:12px}
  #copy{margin-top:8px; background:transparent; color:var(--muted); border:1px solid var(--border)}
  #copy:hover{background:var(--card); color:var(--text)}

  /* ---- No ar ---- */
  .list-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:2px}
  .list-head .label{margin:0}
  #refresh{width:auto; background:transparent; color:var(--muted); border:0; padding:2px 6px; font-size:13px; line-height:1}
  #refresh:hover{color:var(--text); background:transparent}
  #list{max-height:168px; overflow-y:auto; margin-top:4px}
  #list::-webkit-scrollbar{width:6px}
  #list::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px}
  .row{display:flex; align-items:center; gap:8px; padding:8px 0; border-top:1px solid var(--border)}
  .row:first-child{border-top:0}
  .row-main{flex:1; min-width:0}
  .row-main a{color:var(--text); font-size:12px; text-decoration:none; display:block;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .row-main a:hover{text-decoration:underline; text-underline-offset:3px}
  .row-meta{color:var(--muted); font-size:10px}
  .row button{width:auto; background:transparent; color:var(--muted); border:1px solid var(--border);
    padding:5px 9px; font-size:10.5px; border-radius:6px; white-space:nowrap}
  .row button:hover:not(:disabled){background:var(--card); color:var(--text)}
  .row button.confirm{border-color:var(--danger); color:var(--danger)}
  .row button.confirm:hover:not(:disabled){background:rgba(226,75,74,.08); color:var(--danger)}
  .empty{color:var(--muted); font-size:11px; padding:6px 0}
</style>
</head>
<body>

.727C244.932 106.114 241.046 102.227 241.046 97.4329V56.9224C241.046 52.1282 244.932 48.2416 249.727 48.2416H290.237C295.031 48.2416 298.918 52.1282 298.918 56.9224V97.4329Z" fill="currentColor"/><path d="M475.77 232.528V114.706H691.776V232.528H475.77ZM740.869 281.62V65.6137H426.677V281.62H740.869Z" fill="currentColor"/><path d="M863.156 65.6137H769.523V281.62H818.615V114.706H840.264L980.321 281.62H1073.66V65.6137H1024.57L1024.57 232.528H1003.21L863.156 65.6137Z" fill="currentColor"/><path d="M1102.31 65.6137V281.62H1416.51V122.737L1368.57 65.6137L1102.31 65.6137ZM1151.41 232.528V114.706L1333.24 114.706L1367.41 155.431V232.528H1151.41Z" fill="currentColor"/></svg>

0.192 122.467V21.6127C360.192 9.67686 369.868 0.000976562 381.804 0.000976562H482.659C494.594 0.000976562 504.27 9.67685 504.27 21.6127V122.467Z" fill="currentColor" style="animation-delay:-0.75s"/><path d="M264.141 242.532C264.141 254.468 254.465 264.144 242.529 264.144H141.675C129.739 264.144 120.063 254.468 120.063 242.532V141.677C120.063 129.742 129.739 120.066 141.675 120.066H242.529C254.465 120.066 264.141 129.742 264.141 141.677V242.532Z" fill="currentColor" style="animation-delay:-0.875s"/></svg><h1>Pageview</h1></div>
  <div class="sub">Preview de páginas direto do canvas.</div>

  <div class="card">
    <label class="label">Worker URL</label>
    <input type="text" id="workerUrl" placeholder="https://pageview.seuusuario.workers.dev">
    <div class="gap"></div>
    <label class="label">Token <span style="color:var(--muted)">(UPLOAD_SECRET · salvo só no seu Figma)</span></label>
    <input type="password" id="secret" placeholder="••••••••">
  </div>

  <div class="card">
    <div class="frame-info" id="frameInfo">Seleciona o frame da página no canvas.</div>
  </div>

  <div class="card">
    <label class="label">Endereço do preview</label>
    <input type="text" id="slug" placeholder="liso-supremo">
    <div class="finalurl" id="finalUrl"></div>
    <label class="check">
      <input type="checkbox" id="banner" checked>
      Tarja “visualização da versão desktop”
    </label>
  </div>

  <button id="publish" disabled>Publicar preview</button>
  <div id="status"></div>
  <div id="result">
    <a id="link" href="#" target="_blank"></a>
    <button id="copy">Copiar link</button>
  </div>

  <div class="card" style="margin-top:10px">
    <div class="list-head">
      <span class="label">No ar</span>
      <button id="refresh" title="Atualizar lista">↻</button>
    </div>
    <div id="list"><div class="empty">Conecta o Worker pra ver os previews no ar.</div></div>
  </div>

<script>
  var $ = function(id){ return document.getElementById(id); };
  var hasSelection = false;
  var listBase = "";
  var listing = false;

  function send(msg){ parent.postMessage({ pluginMessage: msg }, "*"); }

  function normBase(u){
    u = (u||"").trim().replace(/\/+$/,"");
    if (u && !/^https?:\/\//i.test(u)) u = "https://" + u;
    return u;
  }

  function creds(){
    return { workerUrl: $("workerUrl").value, secret: $("secret").value };
  }

  function updateButton(){
    $("publish").disabled = !hasSelection || !$("workerUrl").value.trim() || !$("secret").value.trim();
  }

  function updateFinalUrl(){
    var b = normBase($("workerUrl").value), s = $("slug").value.trim();
    $("finalUrl").innerHTML = (b && s) ? "No ar em: <span>" + b + "/" + s + "</span>" : "";
  }

  function fmtDate(t){
    if (!t) return "";
    var d = new Date(t);
    return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" }) +
      " " + d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  }

  function fmtSize(b){
    if (!b) return "";
    return b >= 1048576 ? (b/1048576).toFixed(1) + " MB" : Math.round(b/1024) + " KB";
  }

  function renderList(items, base){
    listBase = base;
    var box = $("list");
    box.innerHTML = "";
    if (!items.length){
      box.innerHTML = '<div class="empty">Nenhum preview no ar.</div>';
      return;
    }
    items.forEach(function(it){
      var row = document.createElement("div");
      row.className = "row";

      var main = document.createElement("div");
      main.className = "row-main";
      var a = document.createElement("a");
      a.href = base + "/" + it.slug;
      a.target = "_blank";
      a.textContent = it.slug;
      var meta = document.createElement("div");
      meta.className = "row-meta";
      meta.textContent = fmtDate(it.updated) + " · " + fmtSize(it.bytes);
      main.appendChild(a); main.appendChild(meta);

      var btn = document.createElement("button");
      btn.textContent = "Tirar do ar";
      var armed = false, timer = null;
      btn.onclick = function(){
        if (!armed){
          armed = true;
          btn.textContent = "Confirmar?";
          btn.classList.add("confirm");
          timer = setTimeout(function(){
            armed = false;
            btn.textContent = "Tirar do ar";
            btn.classList.remove("confirm");
          }, 3000);
        } else {
          clearTimeout(timer);
          btn.disabled = true;
          btn.textContent = "Removendo\u2026";
          var c = creds();
          send({ type: "remove", workerUrl: c.workerUrl, secret: c.secret, slug: it.slug });
        }
      };

      row.appendChild(main);
      row.appendChild(btn);
      box.appendChild(row);
    });
  }

  function requestList(){
    if (listing) return;
    var c = creds();
    if (c.workerUrl.trim() && c.secret.trim()){
      listing = true;
      send({ type: "list", workerUrl: c.workerUrl, secret: c.secret });
    }
  }

  window.onmessage = function(e){
    var msg = e.data.pluginMessage;
    if (!msg) return;

    if (msg.type === "settings"){
      $("workerUrl").value = msg.workerUrl || "";
      $("secret").value = msg.secret || "";
      updateButton(); updateFinalUrl();
      requestList();
    }

    if (msg.type === "selection"){
      hasSelection = msg.ok;
      if (msg.ok){
        var mode = msg.sections > 0
          ? '<span class="badge">' + msg.sections + ' seções</span>'
          : '<span class="badge">página inteira</span>';
        $("frameInfo").innerHTML = "<b>" + msg.name + "</b> · " + msg.width + "×" + msg.height + mode;
        if (!$("slug").value || $("slug").dataset.auto !== "0"){
          $("slug").value = msg.slug;
        }
      } else {
        $("frameInfo").textContent = "Seleciona o frame da página no canvas.";
      }
      updateButton(); updateFinalUrl();
    }

    if (msg.type === "progress"){
      $("status").className = "";
      $("status").textContent = msg.msg;
    }

    if (msg.type === "previews"){
      listing = false;
      renderList(msg.items, msg.base);
    }

    if (msg.type === "done"){
      document.body.classList.remove("spin");
      $("publish").disabled = false;
      $("status").className = "";
      $("status").textContent = "No ar ✓";
      $("result").style.display = "block";
      $("link").textContent = msg.url;
      $("link").href = msg.url;
    }

    if (msg.type === "error"){
      listing = false;
      document.body.classList.remove("spin");
      $("publish").disabled = false;
      $("status").className = "error";
      $("status").textContent = msg.msg;
    }
  };

  $("slug").addEventListener("input", function(){ this.dataset.auto = "0"; updateFinalUrl(); });
  $("workerUrl").addEventListener("input", function(){ updateButton(); updateFinalUrl(); });
  $("secret").addEventListener("input", updateButton);
  $("refresh").onclick = requestList;

  $("publish").onclick = function(){
    $("publish").disabled = true;
    $("result").style.display = "none";
    $("status").className = "";
    $("status").textContent = "Preparando\u2026";
    document.body.classList.add("spin");
    var c = creds();
    send({
      type: "publish",
      workerUrl: c.workerUrl,
      secret: c.secret,
      slug: $("slug").value,
      banner: $("banner").checked
    });
  };

  $("copy").onclick = function(){
    var ta = document.createElement("textarea");
    ta.value = $("link").textContent;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    $("copy").textContent = "Copiado \u2713";
    setTimeout(function(){ $("copy").textContent = "Copiar link"; }, 1500);
  };

  send({ type: "init" });
</script>
</body>
</html>
